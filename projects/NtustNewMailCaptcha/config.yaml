Model:
    CharSet: [' ', R, S, Y, W, C, U, A, '6', G, '2', M, P, F, Z, L, E, '9', '4', '8',
        D, '5', J, N, B, Q, X, '3', '7', V, K, H, T]
    ImageChannel: 1
    ImageHeight: 64
    ImageWidth: -1
    Word: false
System:
    Allow_Ext: [jpg, jpeg, png, bmp]
    GPU: false
    GPU_ID: 0
    Path: ./projects/NtustNewMailCaptcha/images_set/images
    Project: NtustNewMailCaptcha
    Val: 0.03
Train:
    BATCH_SIZE: 64
    CNN: {NAME: ddddocr}
    DROPOUT: 0.3
    LR: 0.01
    OPTIMIZER: SGD
    SAVE_CHECKPOINTS_STEP: 300
    TARGET: {Accuracy: 0.98, Cost: 0.05, Epoch: 1}
    TEST_BATCH_SIZE: 64
    TEST_STEP: 100
