Model:
    CharSet: [' ', '9', '7', '8', '2', '0', '6', '4', '1', '3', '5']
    ImageChannel: 1
    ImageHeight: 64
    ImageWidth: -1
    Word: false
System:
    Allow_Ext: [jpg, jpeg, png, bmp]
    GPU: true
    GPU_ID: 0
    Path: .\projects\NtustCourseJudge\images_set\images\
    Project: NtustCourseJudge
    Val: 0.03
Train:
    BATCH_SIZE: 64
    CNN: {NAME: ddddocr}
    DROPOUT: 0.3
    LR: 0.01
    OPTIMIZER: SGD
    SAVE_CHECKPOINTS_STEP: 300
    TARGET: {Accuracy: 0.97, Cost: 0.05, Epoch: 1}
    TEST_BATCH_SIZE: 64
    TEST_STEP: 300
